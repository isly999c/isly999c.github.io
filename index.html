<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANKI 字卡學習系統</title>
    
    <!-- 載入 Tailwind CSS 與配置深色模式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class', // 啟用 class-based 深色模式
      }
    </script>
    
    <!-- 載入 React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 滾動條美化 (適應深淺色) */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #475569; }
        
        * { -webkit-tap-highlight-color: transparent; }

        /* 修正 iOS/Safari 的 3D 翻轉穿透問題 */
        .preserve-3d {
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans selection:bg-indigo-200 dark:selection:bg-indigo-900 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- SVG 圖示庫 ---
        const BookA = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/><path d="m8 13 4-7 4 7"/><path d="M9.1 11h5.7"/></svg>);
        const Upload = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>);
        const Volume2 = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>);
        const RotateCcw = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>);
        const CheckCircle = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>);
        const RefreshCw = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>);
        const Info = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>);
        const X = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>);
        const ImageIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>);
        const ShuffleIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>);
        const Moon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>);
        const Sun = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>);
        const Headphones = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 14h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a9 9 0 0 1 18 0v7a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"/></svg>);
        const Download = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>);
        const Flame = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>);

        // --- 輔助函式 ---
        const extractKK = (details) => {
          if (!details) return null;
          const match = details.match(/KK 音標[：:]?\s*(\[.*?\])/);
          return match ? match[1] : null;
        };

        const defaultCards = [
          {
            word: "manual",
            details: "manual (n) 手冊、手動\nKK 音標：[ˋmænjʊəl]、中文：近似「慢-妞-偶」\n[詞性變化] manual (adj) 手動的\n[搭配詞] manual mode 手動模式、installation manual 安裝手冊\n[例句] Please refer to the training manual if you have any questions.\n如果你有任何疑問，請參閱訓練手冊。"
          },
          {
            word: "installation",
            details: "installation (n) 安裝\nKK 音標：[ˌɪnstəˈleɪʃən]、中文：近似「因-史道-雷-旋」\n[詞性變化] install (v) 安裝\n[搭配詞] software installation 軟體安裝、installation folder 安裝資料夾\n[例句] The installation of the new software is complete.\n新軟體的安裝已完成。"
          }
        ];

        function App() {
          // --- 狀態管理 (包含新功能狀態) ---
          const [totalCards, setTotalCards] = useState(() => { try { const saved = localStorage.getItem('anki-totalCards'); return saved ? JSON.parse(saved) : defaultCards; } catch { return defaultCards; } });
          const [queue, setQueue] = useState(() => { try { const saved = localStorage.getItem('anki-queue'); return saved ? JSON.parse(saved) : defaultCards; } catch { return defaultCards; } });
          const [stats, setStats] = useState(() => { try { const saved = localStorage.getItem('anki-stats'); return saved ? JSON.parse(saved) : { again: 0, hard: 0, good: 0, easy: 0 }; } catch { return { again: 0, hard: 0, good: 0, easy: 0 }; } });
          const [settings, setSettings] = useState(() => { try { const saved = localStorage.getItem('anki-settings'); return saved ? JSON.parse(saved) : { again: '1', hard: 'middle', good: 'end' }; } catch { return { again: '1', hard: 'middle', good: 'end' }; } });
          
          // UI 開關狀態
          const [isFlipped, setIsFlipped] = useState(false);
          const [isInfoOpen, setIsInfoOpen] = useState(false);
          const [showImage, setShowImage] = useState(() => { try { const saved = localStorage.getItem('anki-showImage'); return saved !== null ? JSON.parse(saved) : true; } catch { return true; } });
          const [isDarkMode, setIsDarkMode] = useState(() => { try { const saved = localStorage.getItem('anki-darkMode'); return saved !== null ? JSON.parse(saved) : false; } catch { return false; } });
          const [isBlindMode, setIsBlindMode] = useState(() => { try { const saved = localStorage.getItem('anki-blindMode'); return saved !== null ? JSON.parse(saved) : false; } catch { return false; } });
          const [streak, setStreak] = useState(() => { try { return Number(localStorage.getItem('anki-streak') || 0); } catch { return 0; } });

          const fileInputRef = useRef(null);
          const importBackupRef = useRef(null);

          const progressPercent = totalCards.length > 0 ? ((totalCards.length - queue.length) / totalCards.length) * 100 : 0;

          // 深色模式切換 Effect
          useEffect(() => {
            if (isDarkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            localStorage.setItem('anki-darkMode', JSON.stringify(isDarkMode));
          }, [isDarkMode]);

          // 其他狀態同步
          useEffect(() => {
            localStorage.setItem('anki-totalCards', JSON.stringify(totalCards));
            localStorage.setItem('anki-queue', JSON.stringify(queue));
            localStorage.setItem('anki-stats', JSON.stringify(stats));
            localStorage.setItem('anki-settings', JSON.stringify(settings));
            localStorage.setItem('anki-showImage', JSON.stringify(showImage));
            localStorage.setItem('anki-blindMode', JSON.stringify(isBlindMode));
          }, [totalCards, queue, stats, settings, showImage, isBlindMode]);

          // 語音載入
          useEffect(() => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.getVoices();
                window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
            }
          }, []);

          // 快捷鍵
          useEffect(() => {
            const handleKeyDown = (e) => {
              if (isInfoOpen || queue.length === 0) return;
              if (e.code === 'Space') {
                e.preventDefault(); 
                if (!isFlipped) setIsFlipped(true); 
              } else if (e.code === 'KeyR' || e.key === 'r' || e.key === 'R') {
                shuffleQueue(); 
              } else if (isFlipped) {
                if (e.key === '1') handleRating('again');
                if (e.key === '2') handleRating('hard');
                if (e.key === '3') handleRating('good');
                if (e.key === '4') handleRating('easy');
              }
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [isFlipped, isInfoOpen, queue.length]);

          const shuffleQueue = () => {
            setQueue(prevQueue => {
                if (prevQueue.length <= 1) return prevQueue;
                const array = [...prevQueue];
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            });
            setIsFlipped(false);
          };

          // --- 語音功能 ---
          const getBestAmericanVoice = () => {
              const voices = window.speechSynthesis.getVoices();
              const preferredNames = ['Google US English', 'Samantha', 'Alex', 'Microsoft Zira', 'Microsoft David', 'Fred'];
              for (let name of preferredNames) {
                  let v = voices.find(v => v.name.includes(name));
                  if (v) return v;
              }
              return voices.find(v => v.lang === 'en-US');
          };

          const speakText = (text, e) => {
            if (e && e.stopPropagation) e.stopPropagation();
            if ('speechSynthesis' in window) {
              window.speechSynthesis.cancel();
              let englishText = text.replace(/\([a-zA-Z/]+\)/g, ' ');
              englishText = englishText.replace(/[\u4e00-\u9fa5、，。！；「」：]/g, ' ').trim();
              const utterance = new SpeechSynthesisUtterance(englishText);
              utterance.lang = 'en-US';
              utterance.rate = 0.9; 
              const bestVoice = getBestAmericanVoice();
              if (bestVoice) utterance.voice = bestVoice;
              window.speechSynthesis.speak(utterance);
            }
          };

          // --- 每日打卡 (Streak) 邏輯 ---
          const updateStreak = () => {
            const todayObj = new Date();
            todayObj.setHours(0,0,0,0);
            const todayTime = todayObj.getTime();
            const lastDateStr = localStorage.getItem('anki-lastDate');
            let currentStreak = streak;

            if (lastDateStr) {
                const lastTime = Number(lastDateStr);
                const diffDays = Math.round((todayTime - lastTime) / (1000 * 60 * 60 * 24));
                if (diffDays === 1) currentStreak += 1;
                else if (diffDays > 1) currentStreak = 1;
            } else {
                currentStreak = 1;
            }
            
            localStorage.setItem('anki-lastDate', todayTime.toString());
            localStorage.setItem('anki-streak', currentStreak);
            setStreak(currentStreak);
          };

          const handleRating = (rating, e) => {
            if (e && e.stopPropagation) e.stopPropagation();
            
            setStats(prev => ({ ...prev, [rating]: prev[rating] + 1 }));
            updateStreak(); // 記錄打卡
            
            const currentCard = queue[0];
            const remainingCards = queue.slice(1);
            
            if (rating !== 'easy') {
                const settingVal = settings[rating];
                let insertIndex = 0;
                if (settingVal === 'middle') insertIndex = Math.ceil(remainingCards.length / 2);
                else if (settingVal === 'end') insertIndex = remainingCards.length;
                else insertIndex = Math.min(Number(settingVal), remainingCards.length);
                remainingCards.splice(insertIndex, 0, currentCard);
            }
            setQueue(remainingCards);
            setIsFlipped(false);
          };

          // --- 檔案處理 ---
          const parseCSV = (text) => {
            const result = [];
            let currentWord = '', currentDetails = '', currentImage = '', inQuotes = false, colIndex = 0;
            for (let i = 0; i < text.length; i++) {
              const char = text[i];
              if (char === '"') inQuotes = !inQuotes;
              else if (char === ',' && !inQuotes) colIndex++;
              else if (char === '\n' && !inQuotes) {
                if (currentWord.trim()) result.push({ word: currentWord.trim(), details: currentDetails.trim().replace(/\\n/g, '\n'), image: currentImage.trim() });
                currentWord = ''; currentDetails = ''; currentImage = ''; colIndex = 0;
              } else {
                if (colIndex === 0) currentWord += char;
                else if (colIndex === 1) currentDetails += char;
                else if (colIndex === 2) currentImage += char;
              }
            }
            if (currentWord.trim()) result.push({ word: currentWord.trim(), details: currentDetails.trim().replace(/\\n/g, '\n'), image: currentImage.trim() });
            return result;
          };

          const handleFileUpload = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
              const text = e.target.result.replace(/\r/g, ''); 
              const parsedCards = parseCSV(text);
              if (parsedCards.length > 0) {
                setTotalCards(parsedCards); setQueue([...parsedCards]); setStats({ again: 0, hard: 0, good: 0, easy: 0 }); setIsFlipped(false);
              } else alert("無法解析 CSV 檔案。");
            };
            reader.readAsText(file);
            event.target.value = null;
          };

          // --- 進度備份與還原 ---
          const exportBackup = () => {
              const data = { totalCards, queue, stats, settings, isDarkMode, showImage, isBlindMode, streak };
              const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = `anki-backup-${new Date().toISOString().slice(0,10)}.json`;
              a.click();
          };

          const importBackup = (event) => {
              const file = event.target.files[0];
              if (!file) return;
              const reader = new FileReader();
              reader.onload = (e) => {
                  try {
                      const data = JSON.parse(e.target.result);
                      if(data.totalCards) setTotalCards(data.totalCards);
                      if(data.queue) setQueue(data.queue);
                      if(data.stats) setStats(data.stats);
                      if(data.settings) setSettings(data.settings);
                      alert("進度還原成功！");
                      setIsInfoOpen(false);
                  } catch (err) {
                      alert("檔案格式錯誤，還原失敗。");
                  }
              };
              reader.readAsText(file);
              event.target.value = null;
          };

          const currentCard = queue[0];

          const renderBackContent = (rawText, word) => {
            if (!rawText) return <p className="text-slate-500 dark:text-slate-400">無詳細資料</p>;
            const lines = rawText.split(/\\n|\n/).map(l => l.trim()).filter(Boolean);
            
            return lines.map((line, index) => {
              const tagMatch = line.match(/^\s*\[(.*?)\]\s*(.*)$/);
              if (tagMatch) {
                const tag = tagMatch[1], content = tagMatch[2];
                let contentStyle = "text-slate-800 dark:text-slate-100 font-bold"; 
                if (/[\u4e00-\u9fa5]/.test(content)) contentStyle = "text-slate-700 dark:text-slate-300 font-medium"; 
                const hasEnglishText = /[a-zA-Z]/.test(content);
                const isPlayable = (tag === '詞性變化' || tag === '搭配詞' || tag === '例句') && hasEnglishText;

                return (
                  <div key={index} className="mt-3 mb-1 flex items-start w-full">
                    <div className="flex items-center shrink-0 mt-0.5 mr-2.5">
                      <span className="text-[11px] sm:text-xs font-bold text-indigo-700 dark:text-indigo-300 bg-indigo-100 dark:bg-indigo-900/50 px-2 py-0.5 rounded shadow-sm border border-indigo-200 dark:border-indigo-700">
                        {tag}
                      </span>
                      {isPlayable && content && (
                        <button onClick={(e) => speakText(content, e)} className="ml-1.5 p-1 rounded-full bg-slate-100 dark:bg-slate-700 hover:bg-indigo-100 dark:hover:bg-indigo-800 text-indigo-500 dark:text-indigo-400 transition-all shadow-sm active:scale-95" title="播放英文發音">
                          <Volume2 className="w-3.5 h-3.5" />
                        </button>
                      )}
                    </div>
                    {content && <span className={`text-sm sm:text-base leading-snug flex-1 ${contentStyle}`}>{content}</span>}
                  </div>
                );
              }
              if (line.includes('KK 音標：') || line.includes('音標：')) {
                return (
                  <div key={index} className="inline-block mt-1 mb-3 w-full">
                    <span className="text-xs sm:text-sm text-indigo-700 dark:text-indigo-300 font-semibold bg-indigo-50 dark:bg-indigo-900/40 border border-indigo-100 dark:border-indigo-800 px-2.5 py-1.5 rounded-lg shadow-sm">
                      {line}
                    </span>
                  </div>
                );
              }
              if (index === 0) {
                const cleanFirstLine = line.replace(new RegExp(`^${word}\\s*`, 'i'), '');
                return <h3 key={index} className="text-lg sm:text-xl font-black text-slate-800 dark:text-white mb-2 leading-tight border-b-2 border-slate-100 dark:border-slate-700 pb-2">{cleanFirstLine || line}</h3>;
              }
              
              const hasChinese = /[\u4e00-\u9fa5]/.test(line), hasEnglish = /[a-zA-Z]/.test(line), cleanLine = line.replace(/\(無\)/g, '無');
              if (hasChinese && !hasEnglish) return <p key={index} className="text-slate-500 dark:text-slate-400 text-xs sm:text-sm leading-snug mb-2 break-words">{cleanLine}</p>;
              else if (hasChinese && hasEnglish) return <p key={index} className="text-slate-700 dark:text-slate-300 text-sm sm:text-base font-medium leading-snug mb-1.5 break-words">{cleanLine}</p>;
              else return <p key={index} className="text-slate-800 dark:text-slate-100 text-sm sm:text-base font-bold leading-snug mb-0.5 break-words">{cleanLine}</p>;
            });
          };

          // 設定 Modal
          const InfoModal = () => (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm overflow-y-auto" onClick={() => setIsInfoOpen(false)}>
              <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl max-w-md w-full p-6 relative my-8" onClick={(e) => e.stopPropagation()}>
                <button onClick={() => setIsInfoOpen(false)} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600 dark:hover:text-white bg-slate-100 dark:bg-slate-700 rounded-full p-1 transition-colors">
                  <X className="w-5 h-5" />
                </button>
                <h3 className="text-xl font-black text-slate-800 dark:text-white mb-4 flex items-center">
                  <Info className="w-6 h-6 mr-2 text-indigo-500" /> 設定與說明
                </h3>
                
                <div className="space-y-4 text-sm text-slate-600 dark:text-slate-300">
                  
                  {/* 資料備份區塊 */}
                  <div className="bg-emerald-50 dark:bg-emerald-900/20 p-3.5 rounded-xl border border-emerald-100 dark:border-emerald-800/50">
                    <p className="font-bold text-emerald-800 dark:text-emerald-400 mb-3 border-b border-emerald-200 dark:border-emerald-800 pb-1.5 flex items-center">
                      💾 進度備份與還原
                    </p>
                    <div className="flex space-x-3">
                        <button onClick={exportBackup} className="flex-1 flex items-center justify-center space-x-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-lg font-bold shadow-sm transition-colors">
                            <Download className="w-4 h-4" /> <span>匯出備份 (.json)</span>
                        </button>
                        <input type="file" accept=".json" ref={importBackupRef} onChange={importBackup} className="hidden" />
                        <button onClick={() => importBackupRef.current.click()} className="flex-1 flex items-center justify-center space-x-1 bg-emerald-100 dark:bg-emerald-800 text-emerald-700 dark:text-emerald-300 hover:bg-emerald-200 py-2 rounded-lg font-bold shadow-sm transition-colors">
                            <Upload className="w-4 h-4" /> <span>還原進度</span>
                        </button>
                    </div>
                  </div>

                  <div className="bg-slate-50 dark:bg-slate-700/50 p-3.5 rounded-xl border border-slate-200 dark:border-slate-600">
                    <p className="font-bold text-slate-800 dark:text-white mb-3 border-b border-slate-200 dark:border-slate-600 pb-1.5">⚙️ 複習間隔設定</p>
                    <div className="space-y-3">
                      <div className="flex justify-between items-center">
                        <span className="font-bold text-red-500">Again:</span>
                        <select value={settings.again} onChange={(e) => setSettings({...settings, again: e.target.value})} className="bg-white dark:bg-slate-600 border border-slate-300 dark:border-slate-500 rounded px-2 py-1 outline-none text-xs sm:text-sm font-medium">
                          <option value="1">1 張後</option><option value="3">3 張後</option><option value="middle">正中間</option><option value="end">最後</option>
                        </select>
                      </div>
                      <div className="flex justify-between items-center">
                        <span className="font-bold text-orange-500">Hard:</span>
                        <select value={settings.hard} onChange={(e) => setSettings({...settings, hard: e.target.value})} className="bg-white dark:bg-slate-600 border border-slate-300 dark:border-slate-500 rounded px-2 py-1 outline-none text-xs sm:text-sm font-medium">
                          <option value="3">3 張後</option><option value="5">5 張後</option><option value="middle">正中間</option><option value="end">最後</option>
                        </select>
                      </div>
                      <div className="flex justify-between items-center">
                        <span className="font-bold text-blue-500">Good:</span>
                        <select value={settings.good} onChange={(e) => setSettings({...settings, good: e.target.value})} className="bg-white dark:bg-slate-600 border border-slate-300 dark:border-slate-500 rounded px-2 py-1 outline-none text-xs sm:text-sm font-medium">
                          <option value="middle">正中間</option><option value="10">10 張後</option><option value="end">最後</option>
                        </select>
                      </div>
                    </div>
                  </div>

                  <div className="bg-indigo-50 dark:bg-indigo-900/30 p-3 rounded-xl border border-indigo-100 dark:border-indigo-800">
                    <p className="font-bold text-indigo-800 dark:text-indigo-300 mb-2 border-b border-indigo-200 dark:border-indigo-700 pb-1">快捷鍵：</p>
                    <ul className="space-y-1.5 text-xs sm:text-sm">
                      <li><kbd className="bg-white dark:bg-slate-700 border dark:border-slate-600 shadow-sm px-1.5 py-0.5 rounded font-mono mr-1 text-indigo-600 dark:text-indigo-400">Space</kbd> 翻開卡片</li>
                      <li><kbd className="bg-white dark:bg-slate-700 border dark:border-slate-600 shadow-sm px-1.5 py-0.5 rounded font-mono mr-1 text-slate-700 dark:text-slate-300">R</kbd> 隨機打亂</li>
                      <li><kbd className="bg-white dark:bg-slate-700 border dark:border-slate-600 shadow-sm px-1.5 py-0.5 rounded font-mono mr-1">1</kbd>~<kbd className="bg-white dark:bg-slate-700 border dark:border-slate-600 shadow-sm px-1.5 py-0.5 rounded font-mono mx-1">4</kbd> 進行評分</li>
                    </ul>
                  </div>
                </div>
                <button onClick={() => setIsInfoOpen(false)} className="w-full mt-5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl transition-colors">
                  完成設定
                </button>
              </div>
            </div>
          );

          if (queue.length === 0) {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center p-4">
                <div className="bg-white dark:bg-slate-800 p-10 rounded-3xl shadow-xl max-w-md w-full text-center">
                  <CheckCircle className="w-20 h-20 text-emerald-500 mx-auto mb-6" />
                  <h2 className="text-3xl font-black mb-4 dark:text-white">練習完成！</h2>
                  <div className="grid grid-cols-2 gap-4 mb-8 text-left">
                    <div className="bg-red-50 dark:bg-red-900/20 p-3 rounded-xl border border-red-100 dark:border-red-900/50"><span className="text-red-500 font-bold text-sm block">Again</span><span className="text-xl font-black dark:text-red-100">{stats.again}</span></div>
                    <div className="bg-orange-50 dark:bg-orange-900/20 p-3 rounded-xl border border-orange-100 dark:border-orange-900/50"><span className="text-orange-500 font-bold text-sm block">Hard</span><span className="text-xl font-black dark:text-orange-100">{stats.hard}</span></div>
                    <div className="bg-blue-50 dark:bg-blue-900/20 p-3 rounded-xl border border-blue-100 dark:border-blue-900/50"><span className="text-blue-500 font-bold text-sm block">Good</span><span className="text-xl font-black dark:text-blue-100">{stats.good}</span></div>
                    <div className="bg-emerald-50 dark:bg-emerald-900/20 p-3 rounded-xl border border-emerald-100 dark:border-emerald-900/50"><span className="text-emerald-500 font-bold text-sm block">Easy</span><span className="text-xl font-black dark:text-emerald-100">{stats.easy}</span></div>
                  </div>
                  <button onClick={() => { setQueue([...totalCards]); setStats({ again: 0, hard: 0, good: 0, easy: 0 }); setIsFlipped(false); }} className="w-full flex justify-center items-center space-x-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-4 rounded-xl transition-colors font-bold text-lg">
                    <RefreshCw className="w-5 h-5" /> <span>重新開始練習</span>
                  </button>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen flex flex-col">
              {isInfoOpen && <InfoModal />}

              {/* Header */}
              <header className="bg-white dark:bg-slate-800 shadow-sm dark:border-b dark:border-slate-700 px-3 sm:px-4 py-3 z-10 shrink-0">
                <div className="flex justify-between items-center max-w-5xl mx-auto w-full gap-2 sm:gap-4">
                  <div className="hidden md:flex items-center space-x-2 text-indigo-600 dark:text-indigo-400 shrink-0">
                    <BookA className="w-6 h-6" />
                    <h1 className="text-lg font-black tracking-wide">ANKI</h1>
                  </div>
                  
                  <div className="flex items-center gap-3 sm:gap-4 text-xs sm:text-sm font-bold bg-slate-50 dark:bg-slate-900/50 border border-slate-100 dark:border-slate-700 px-3 py-1.5 rounded-2xl flex-1 overflow-x-auto custom-scrollbar whitespace-nowrap">
                    {/* 火焰打卡 */}
                    <div className="flex items-center text-orange-500 dark:text-orange-400 bg-orange-50 dark:bg-orange-900/20 px-2 py-1 rounded-lg shrink-0" title="連續打卡天數">
                        <Flame className="w-4 h-4 mr-1" />
                        <span>{streak} 天</span>
                    </div>

                    <div className="flex items-center gap-2 bg-white dark:bg-slate-700 px-2 py-1 rounded-lg shadow-sm border border-slate-100 dark:border-slate-600 shrink-0">
                      <div className="hidden sm:block w-16 h-2 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                        <div className="h-full bg-indigo-500 transition-all duration-300" style={{ width: `${progressPercent}%` }}></div>
                      </div>
                      <span className="text-slate-700 dark:text-slate-200 font-mono">
                        <span className="text-indigo-600 dark:text-indigo-400">{queue.length}</span> / {totalCards.length}
                      </span>
                    </div>
                    <div className="h-4 w-px bg-slate-200 dark:bg-slate-600 shrink-0"></div>
                    <div className="flex space-x-3 shrink-0">
                      <span className="text-red-500">Again: {stats.again}</span>
                      <span className="text-emerald-500">Easy: {stats.easy}</span>
                    </div>
                  </div>
                  
                  <div className="flex items-center space-x-2 shrink-0">
                    {/* 盲測模式開關 */}
                    <button onClick={() => setIsBlindMode(!isBlindMode)} className={`flex items-center justify-center p-2 sm:px-3 sm:py-1.5 rounded-xl transition-colors shadow-sm ${isBlindMode ? 'bg-purple-100 dark:bg-purple-900/50 text-purple-600 dark:text-purple-400' : 'bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400'}`} title="聽力盲測模式">
                      <Headphones className="w-4 h-4 sm:mr-1" />
                      <span className="hidden sm:block text-xs sm:text-sm font-semibold">{isBlindMode ? '盲測開' : '盲測關'}</span>
                    </button>
                    
                    {/* 深淺色開關 */}
                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 sm:py-1.5 rounded-xl bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-yellow-400 shadow-sm">
                      {isDarkMode ? <Sun className="w-4 h-4" /> : <Moon className="w-4 h-4" />}
                    </button>

                    <button onClick={shuffleQueue} className="hidden sm:flex items-center justify-center bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 px-3 py-1.5 rounded-xl shadow-sm text-sm font-semibold"><ShuffleIcon className="w-4 h-4 mr-1" />隨機</button>
                    <button onClick={() => setIsInfoOpen(true)} className="flex items-center justify-center bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 p-2 sm:px-3 sm:py-1.5 rounded-xl shadow-sm text-xs sm:text-sm font-semibold"><Info className="w-4 h-4 sm:mr-1" /><span className="hidden sm:block">設定</span></button>
                    
                    <input type="file" accept=".csv" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                    <button onClick={() => fileInputRef.current.click()} className="flex items-center bg-slate-800 dark:bg-slate-100 text-white dark:text-slate-800 p-2 sm:px-3 sm:py-1.5 rounded-xl text-xs sm:text-sm font-semibold shadow-sm"><Upload className="w-4 h-4 sm:mr-1" /><span className="hidden sm:block">匯入</span></button>
                  </div>
                </div>
              </header>

              <main className="flex-1 flex flex-col items-center justify-center p-3 sm:p-6 overflow-hidden w-full max-w-3xl mx-auto">
                <div className="relative w-full max-w-md mx-auto aspect-[3/4] sm:aspect-[4/5] cursor-pointer group preserve-3d" onClick={() => !isFlipped && setIsFlipped(true)}>
                  <div className="w-full h-full relative preserve-3d" style={{ transition: 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)', transform: isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)' }}>
                    
                    {/* 正面 */}
                    <div className="absolute w-full h-full bg-white dark:bg-slate-800 rounded-3xl shadow-[0_4px_20px_rgb(0,0,0,0.06)] dark:shadow-[0_4px_20px_rgb(0,0,0,0.3)] border border-slate-200 dark:border-slate-700 flex flex-col items-center justify-center p-6 text-center backface-hidden" style={{ transform: 'rotateY(0deg)' }}>
                      <div className="absolute top-6 flex flex-col items-center text-slate-400 dark:text-slate-500">
                        <div className="text-xs font-bold tracking-widest uppercase flex items-center space-x-1.5 mb-1">
                          <RotateCcw className="w-3.5 h-3.5" /><span>點擊顯示答案</span>
                        </div>
                      </div>

                      {/* 盲測模式：單字模糊處理 */}
                      <h2 className={`text-5xl sm:text-6xl font-black text-slate-800 dark:text-white break-words drop-shadow-sm px-2 transition-all duration-300 ${isBlindMode ? 'blur-md select-none text-slate-300 dark:text-slate-600' : ''}`}>
                        {isBlindMode ? "🎧 聽發音" : currentCard.word}
                      </h2>

                      {extractKK(currentCard.details) && !isBlindMode && (
                        <div className="mt-4 bg-slate-50 dark:bg-slate-700/50 text-slate-500 dark:text-slate-400 px-4 py-1.5 rounded-lg border border-slate-100 dark:border-slate-600 shadow-sm">
                          <span className="text-sm sm:text-base font-medium font-mono">KK 音標 {extractKK(currentCard.details)}</span>
                        </div>
                      )}

                      <button onClick={(e) => speakText(currentCard.word, e)} className="absolute bottom-8 flex items-center space-x-2 bg-indigo-50 dark:bg-indigo-900/40 hover:bg-indigo-600 dark:hover:bg-indigo-600 hover:text-white text-indigo-600 dark:text-indigo-400 px-5 py-2.5 rounded-full transition-all active:scale-95 shadow-sm">
                        <Volume2 className="w-5 h-5" />
                        <span className="font-bold">發音</span>
                      </button>
                    </div>

                    {/* 背面 */}
                    <div className="absolute w-full h-full bg-white dark:bg-slate-800 rounded-3xl shadow-[0_4px_20px_rgb(0,0,0,0.06)] dark:shadow-[0_4px_20px_rgb(0,0,0,0.3)] border border-slate-200 dark:border-slate-700 p-5 sm:p-6 flex flex-col overflow-hidden backface-hidden" style={{ transform: 'rotateY(180deg)' }}>
                      {showImage && (
                        <img src={currentCard.image || `https://loremflickr.com/400/200/${encodeURIComponent(currentCard.word)},engineering/all`} alt={currentCard.word} onError={(e) => { e.target.style.display = 'none'; }} className="w-full h-28 sm:h-32 object-cover rounded-2xl shrink-0 mb-4 bg-slate-50 dark:bg-slate-700 border border-slate-100 dark:border-slate-600" />
                      )}
                      <div className="text-left w-full flex-1 flex flex-col justify-start overflow-y-auto custom-scrollbar pr-2">
                        {renderBackContent(currentCard.details, currentCard.word)}
                      </div>
                    </div>

                  </div>
                </div>

                {/* 底部按鈕 */}
                <div className={`w-full max-w-md mx-auto transition-all duration-300 mt-5 sm:mt-6 ${isFlipped ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4 pointer-events-none'}`}>
                  <div className="grid grid-cols-4 gap-2 w-full">
                    <button onClick={(e) => handleRating('again', e)} className="py-3 sm:py-4 rounded-2xl bg-white dark:bg-slate-800 border-2 border-red-100 dark:border-red-900/50 text-red-600 dark:text-red-400 active:scale-95 shadow-sm font-black text-sm sm:text-base">Again</button>
                    <button onClick={(e) => handleRating('hard', e)} className="py-3 sm:py-4 rounded-2xl bg-white dark:bg-slate-800 border-2 border-orange-100 dark:border-orange-900/50 text-orange-600 dark:text-orange-400 active:scale-95 shadow-sm font-black text-sm sm:text-base">Hard</button>
                    <button onClick={(e) => handleRating('good', e)} className="py-3 sm:py-4 rounded-2xl bg-white dark:bg-slate-800 border-2 border-blue-100 dark:border-blue-900/50 text-blue-600 dark:text-blue-400 active:scale-95 shadow-sm font-black text-sm sm:text-base">Good</button>
                    <button onClick={(e) => handleRating('easy', e)} className="py-3 sm:py-4 rounded-2xl bg-white dark:bg-slate-800 border-2 border-emerald-100 dark:border-emerald-900/50 text-emerald-600 dark:text-emerald-400 active:scale-95 shadow-sm font-black text-sm sm:text-base">Easy</button>
                  </div>
                </div>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
